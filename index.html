<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado UH-60M – Limitações</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap">
    <style>
        :root {
            --primary: #D4AF37; /* Gold */
            --bg-color: #0F1113;
            --card-bg: #1A1D21;
            --input-bg: #25292E;
            --border-color: #33383E;
            --text-color: #E0E0E0;
            --muted: #8E9299;
            --success: #4CAF50;
            --error: #F44336;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.6;
            padding-bottom: 80px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            position: relative;
            z-index: 100;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .title-area h1 {
            color: var(--primary);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-container {
            flex: 1;
            max-width: 300px;
        }

        .progress-text {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .progress-bar-bg {
            height: 4px;
            background-color: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 15px;
            flex: 1;
        }

        .welcome-screen {
            text-align: center;
            padding: 5rem 1rem;
        }

        .welcome-screen h2 {
            margin-bottom: 2rem;
            color: #fff;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .section-title {
            margin: 40px 0 20px;
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .card-header {
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        td, th {
            border: 1px solid var(--border-color);
            padding: 8px 6px;
            text-align: left;
            font-size: 0.85rem;
        }

        th {
            background-color: #212529;
            color: #fff;
            font-weight: 600;
        }

        input[type="text"], input[type="number"] {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--primary);
            padding: 4px;
            border-radius: 4px;
            font-size: 14px; /* Prevent iOS zoom */
            width: 55px; /* Reduced to fit more content */
            text-align: center;
            margin: 2px 1px;
            font-weight: bold;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input:focus {
            border-color: var(--primary);
        }

        .correct-input {
            border-color: var(--success) !important;
            background-color: rgba(76, 175, 80, 0.1) !important;
        }

        .error-input {
            border-color: var(--error) !important;
            background-color: rgba(244, 67, 54, 0.1) !important;
        }

        .gabarito-text {
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 5px;
        }

        .btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active { transform: scale(0.96); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .btn-back { 
            background: rgba(255,255,255,0.05); 
            padding: 6px 10px; 
            font-size: 0.65rem; 
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
            align-self: flex-start;
        }

        .btn-section-correct {
            display: block;
            margin: 10px auto 25px;
            width: 100%;
            max-width: 300px;
            font-size: 0.8rem;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .footer-actions {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(26, 29, 33, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .footer-actions .btn { width: 160px; }

        @media (max-width: 1024px) {
            .footer-actions {
                position: fixed !important;
                right: 0 !important;
                left: 0 !important;
                bottom: 0 !important;
                top: auto !important;
                transform: none !important;
                flex-direction: row !important;
                width: 100% !important;
                background: #0F1113 !important;
                padding: 10px 5px !important;
                border-radius: 0 !important;
                border-top: 1px solid var(--border-color) !important;
                gap: 4px !important;
                box-shadow: 0 -5px 15px rgba(0,0,0,0.8) !important;
            }
            .footer-actions .btn {
                flex: 1;
                width: auto;
                font-size: 0.65rem;
                padding: 8px 1px;
                height: 44px;
            }
            .container { padding: 10px 5px; width: 100%; max-width: 100%; margin: 0; }
            .card { padding: 10px 5px; margin-bottom: 15px; border-radius: 4px; overflow-x: visible; }
            table { width: 100%; border-collapse: collapse; }
            input[type="text"], input[type="number"] { width: 45px; padding: 4px 1px; font-size: 16px; margin: 0 1px; }
            td, th { padding: 6px 2px; font-size: 0.72rem; word-break: break-word; }
            .section-title { font-size: 0.9rem; margin: 25px 0 10px; width: 100%; }
            body { padding-bottom: 180px; }
            .header { padding: 15px 10px; }
            .header-content { flex-direction: column; text-align: center; padding: 0; gap: 10px; }
            .progress-container { width: 100%; max-width: none; }
            .btn-back { display: none !important; }

            .btn-floating-exit {
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 2000;
                padding: 10px 18px;
                border-radius: 50px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.6);
                background-color: rgba(30,32,35,0.95);
                border: 1px solid var(--primary);
                color: var(--primary);
                font-size: 0.85rem;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 8px;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                opacity: 0;
                pointer-events: none;
                transform: translateY(-20px);
                cursor: pointer;
                backdrop-filter: blur(8px);
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .btn-floating-exit.visible {
                opacity: 1;
                pointer-events: auto;
                transform: translateY(0);
            }

            .btn-floating-exit:active {
                transform: scale(0.95);
            }

            .title-area h1 { font-size: 1.1rem; }
            .btn-section-correct { margin-bottom: 15px; font-size: 0.7rem; }
        }

        .hidden {
            display: none !important;
        }

        .stats-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .stats-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--primary);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        .score-value { font-size: 3rem; color: var(--primary); font-weight: 800; margin: 1rem 0; }

        /* Estilos do Modo Teste */
        .test-config-card { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); max-width: 500px; margin: 0 auto; }
        .theme-selection { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 1.5rem 0; text-align: left; }
        .theme-item { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .theme-item.selected { background: rgba(212, 175, 55, 0.1); border-color: var(--primary); }
        .theme-item input { pointer-events: none; width: auto; margin: 0; }
        
        .test-container { max-width: 600px; margin: 0 auto; text-align: center; }
        .test-question-card { 
            background: var(--card-bg); 
            padding: 1.5rem; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            margin-top: 20px; 
            min-height: 250px; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto;
            max-height: 80vh;
        }
        .test-category { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .test-title { font-size: 1.4rem; color: #fff; font-weight: 700; margin-bottom: 20px; }
        .test-prompt { font-size: 1rem; color: var(--muted); margin-bottom: 25px; }
        .test-input-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .test-input { width: 120px !important; font-size: 1.5rem !important; height: 60px !important; }
        .feedback-area { margin-top: 20px; min-height: 60px; font-weight: bold; }
        .test-nav { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }

        /* Corrigindo visibilidade do Select */
        select {
            appearance: none;
            -webkit-appearance: none;
            background-color: var(--input-bg) !important;
            color: white !important;
            padding: 12px !important;
            cursor: pointer;
            border: 1px solid var(--border-color) !important;
            border-radius: 6px;
        }
        
        select option {
            background-color: #1A1D21 !important;
            color: white !important;
            padding: 10px;
        }

        .select-all-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 0.8rem;
            text-decoration: underline;
            cursor: pointer;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body onscroll="handleScroll()">
    <button class="btn-floating-exit" id="btnFloatingExit" onclick="goToHome()">
        <span>←</span> SAIR
    </button>

    <div class="header" id="mainHeader">
        <div class="header-content">
            <button class="btn btn-back hidden" id="btnBackHome" onclick="goToHome()">← Sair</button>
            <div class="title-area">
                <h1>Treino UH-60M – Limitações</h1>
            </div>
            <div class="progress-container" id="headerProgress">
                <div class="progress-text" id="progressText">0% concluído (0 / 0)</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="welcomeScreen" class="welcome-screen">
            <h2>Simulado de Limitações</h2>
            <div style="display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: 0 auto;">
                <button class="btn" onclick="startApp()">Modo Estudo</button>
                <button class="btn btn-secondary" onclick="showTestConfig()">Simulação de Teste</button>
            </div>
        </div>

        <div id="quizContent" class="hidden">
            <div id="sections"></div>
            <div style="margin-top: 40px; text-align: center; margin-bottom: 60px;">
                <button class="btn btn-secondary" onclick="goToHome()" style="width: 200px;">← Voltar ao Início</button>
            </div>
        </div>

        <!-- Tela de Configuração do Teste -->
        <div id="testConfigScreen" class="hidden">
            <div class="test-config-card">
                <h3>Configurar Simulado</h3>
                <div style="text-align: right;">
                    <button class="select-all-btn" onclick="toggleAllThemesSelector()">Selecionar Todos</button>
                </div>
                <div class="theme-selection" id="themeSelection">
                    <!-- Gerado dinamicamente -->
                </div>
                <div style="margin: 20px 0;">
                    <label style="display: block; margin-bottom: 10px;">Quantidade de perguntas:</label>
                    <select id="testQuestionCount" class="btn btn-secondary" style="width: 100%; border: 1px solid var(--border-color); color: #fff;">
                        <option value="10">10 perguntas</option>
                        <option value="20">20 perguntas</option>
                        <option value="30">30 perguntas</option>
                        <option value="50">50 perguntas</option>
                        <option value="all">Todas as perguntas</option>
                    </select>
                </div>
                <button class="btn" style="width: 100%;" onclick="startTest()">Iniciar Simulado</button>
            </div>
        </div>

        <!-- Tela de Jogo do Teste -->
        <div id="testPlayScreen" class="hidden">
            <div class="test-container">
                <div id="testProgress">Pergunta 1 de X</div>
                <div class="test-question-card" id="questionCard">
                    <div class="test-category" id="qCategory">MOTOR</div>
                    <div class="test-title" id="qTitle">NP</div>
                    <div class="test-prompt" id="qPrompt">Somente MTF</div>
                    <div class="test-input-wrapper">
                        <input type="number" class="test-input" id="testInput" placeholder="--">
                    </div>
                    <div class="feedback-area" id="testFeedback"></div>
                </div>
                <div class="test-nav" style="margin-bottom: 20px;">
                    <button class="btn" id="btnNext" onclick="handleQuestionSubmit()">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-actions hidden" id="footerActions">
        <button class="btn btn-outline" onclick="refazer()">Refazer</button>
        <button class="btn btn-secondary" onclick="toggleGabarito()" id="btnGabarito">Gabarito</button>
        <button class="btn" onclick="corrigir()">Corrigir Prova</button>
    </div>

    <div id="statsOverlay" class="stats-overlay hidden">
        <div class="stats-card">
            <h3 id="statsTitle">Resultado</h3>
            <div id="scoreDisplay" class="score-value">0/0</div>
            <p id="feedbackText"></p>
            <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 10px;">
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" style="flex: 1" onclick="closeStats()">Revisar</button>
                    <button class="btn" style="flex: 1" onclick="refazer()">Refazer</button>
                </div>
                <button class="btn btn-outline" style="width: 100%" onclick="goToHome()">Voltar ao Início</button>
            </div>
        </div>
    </div>

        let isGabaritoVisible = false;
        let testTopics = [];
        let currentTestQuestions = [];
        let currentQuestionIdx = 0;
        let testScore = 0;
        let isAnswered = false;

        function goToHome() {
            document.getElementById('welcomeScreen').classList.remove('hidden');
            document.getElementById('quizContent').classList.add('hidden');
            document.getElementById('testConfigScreen').classList.add('hidden');
            document.getElementById('testPlayScreen').classList.add('hidden');
            document.getElementById('footerActions').classList.add('hidden');
            document.getElementById('btnBackHome').classList.add('hidden');
            document.getElementById('headerProgress').classList.remove('hidden');
            document.getElementById('btnFloatingExit').classList.remove('visible');
            closeStats();
            window.scrollTo(0, 0);
        }

        function handleScroll() {
            const btn = document.getElementById('btnFloatingExit');
            const welcome = document.getElementById('welcomeScreen');
            
            // Só mostra se NÃO estiver na home e descer um pouco
            if (welcome.classList.contains('hidden')) {
                if (window.scrollY > 120) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            } else {
                btn.classList.remove('visible');
            }
        }

        function showTestConfig() {
            testTopics = [];
            quizData.forEach(section => {
                section.items.forEach(item => {
                    testTopics.push({
                        cat: section.section.replace("Limitações de ", "").toUpperCase(),
                        title: item.title,
                        content: item.content
                    });
                });
            });

            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('testConfigScreen').classList.remove('hidden');
            document.getElementById('btnBackHome').classList.remove('hidden');
            
            const themes = [...new Set(testTopics.map(q => q.cat))];
            const themeContainer = document.getElementById('themeSelection');
            themeContainer.innerHTML = themes.map(t => `
                <div class="theme-item selected" onclick="toggleTheme(this)">
                    <input type="checkbox" checked value="${t}">
                    <span>${t}</span>
                </div>
            `).join('');
        }

        function toggleTheme(el) {
            el.classList.toggle('selected');
            const cb = el.querySelector('input');
            cb.checked = el.classList.contains('selected');
        }

        let allThemesSelected = true;
        function toggleAllThemesSelector() {
            allThemesSelected = !allThemesSelected;
            const items = document.querySelectorAll('.theme-item');
            const btn = document.querySelector('.select-all-btn');
            
            items.forEach(item => {
                const cb = item.querySelector('input');
                if (allThemesSelected) {
                    item.classList.add('selected');
                    cb.checked = true;
                } else {
                    item.classList.remove('selected');
                    cb.checked = false;
                }
            });
            
            btn.innerText = allThemesSelected ? "Desmarcar Todos" : "Selecionar Todos";
        }

        function startTest() {
            const selectedThemes = Array.from(document.querySelectorAll('#themeSelection input:checked')).map(i => i.value);
            if (selectedThemes.length === 0) {
                alert("Selecione pelo menos um tema!");
                return;
            }

            let questions = testTopics.filter(q => selectedThemes.includes(q.cat));
            
            // Shuffle
            questions = questions.sort(() => Math.random() - 0.5);

            const countStr = document.getElementById('testQuestionCount').value;
            const count = countStr === 'all' ? questions.length : parseInt(countStr);
            currentTestQuestions = questions.slice(0, count);
            
            currentQuestionIdx = 0;
            testScore = 0;
            isAnswered = false;

            document.getElementById('testConfigScreen').classList.add('hidden');
            document.getElementById('testPlayScreen').classList.remove('hidden');
            document.getElementById('headerProgress').classList.add('hidden');
            
            // Mostrar rodapé e ocultar botões do modo estudo
            document.getElementById('footerActions').classList.remove('hidden');
            document.getElementById('btnGabarito').classList.add('hidden');
            document.querySelectorAll('#footerActions .btn').forEach(b => b.classList.add('hidden'));
            
            renderTestQuestion();
        }

        function renderTestQuestion() {
            const q = currentTestQuestions[currentQuestionIdx];
            document.getElementById('testProgress').innerText = `Tópico ${currentQuestionIdx + 1} de ${currentTestQuestions.length}`;
            document.getElementById('qCategory').innerText = q.cat;
            document.getElementById('qTitle').innerText = q.title;
            document.getElementById('qPrompt').innerText = "Preencha todos os campos do tópico abaixo:";
            
            const card = document.getElementById('questionCard');
            const inputWrapper = card.querySelector('.test-input-wrapper');
            inputWrapper.innerHTML = q.content;
            
            // Limpa os campos injetados para o simulado
            inputWrapper.querySelectorAll('input').forEach(input => {
                input.value = "";
                input.classList.remove('correct-input', 'error-input');
            });

            document.getElementById('testFeedback').innerText = "";
            document.getElementById('btnNext').innerText = "Confirmar";
            isAnswered = false;
        }

        function handleQuestionSubmit() {
            if (isAnswered) {
                currentQuestionIdx++;
                if (currentQuestionIdx < currentTestQuestions.length) {
                    renderTestQuestion();
                } else {
                    showStats("Simulado Finalizado", testScore, currentTestQuestions.length);
                }
                return;
            }

            const card = document.getElementById('questionCard');
            const inputs = card.querySelectorAll('input:not([readonly])');
            const feedback = document.getElementById('testFeedback');
            
            let allCorrect = true;

            inputs.forEach(input => {
                const userVal = input.value.trim();
                const correct = answerKey[input.id];
                
                if (userVal == correct) {
                    input.classList.add('correct-input');
                    input.classList.remove('error-input');
                } else {
                    allCorrect = false;
                    input.classList.add('error-input');
                    input.classList.remove('correct-input');
                    
                    // Mostra o resultado correto abaixo do input se errar
                    const span = document.createElement('span');
                    span.className = 'gabarito-text-test';
                    span.style.color = 'var(--primary)';
                    span.style.fontSize = '0.7rem';
                    span.style.display = 'block';
                    span.innerText = `[${correct}]`;
                    input.after(span);
                }
            });

            if (allCorrect) {
                testScore++;
                feedback.innerText = "Tópico preenchido corretamente!";
                feedback.style.color = "var(--success)";
            } else {
                feedback.innerHTML = `Alguns campos estão incorretos. Verifique os valores em destaque.`;
                feedback.style.color = "var(--error)";
            }

            isAnswered = true;
            document.getElementById('btnNext').innerText = "Próximo Tópico";
        }

        function startApp() {
            document.getElementById('btnBackHome').classList.remove('hidden');
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('footerActions').classList.remove('hidden');
            
            // Mostrar botões normais
            document.querySelectorAll('#footerActions .btn').forEach(b => b.classList.remove('hidden'));
            
            document.getElementById('btnFloatingExit').classList.add('visible');

            renderQuiz();
            loadProgress();
            updateProgress();
            window.scrollTo(0, 0);
        }

        function renderQuiz() {
            const container = document.getElementById('sections');
            container.innerHTML = quizData.map((sec, secIdx) => `
                <div class="section-title">${sec.section}</div>
                <button class="btn btn-section-correct" onclick="corrigirSecao(${secIdx})">Corrigir ${sec.section}</button>
                ${sec.items.map((item, itemIdx) => `
                    <div class="card">
                        <div class="card-header">${item.title}</div>
                        <div class="card-body">
                            ${item.content}
                        </div>
                    </div>
                `).join('')}
            `).join('');

            // Add input listeners
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', () => {
                    saveProgress();
                    updateProgress();
                });
            });
        }

        function corrigir() {
            let acertos = 0;
            let respondidas = 0;
            const inputs = document.querySelectorAll('input:not([readonly])');

            inputs.forEach(input => {
                const val = input.value.trim();
                if (val !== "") {
                    respondidas++;
                    const correct = answerKey[input.id];
                    if (val == correct) {
                        acertos++;
                        input.classList.add('correct-input');
                        input.classList.remove('error-input');
                    } else {
                        input.classList.add('error-input');
                        input.classList.remove('correct-input');
                    }
                } else {
                    input.classList.remove('correct-input', 'error-input');
                }
            });

            showStats("Geral", acertos, respondidas);
        }

        function corrigirSecao(idx) {
            let acertos = 0;
            let respondidas = 0;
            
            const allTitles = document.querySelectorAll('.section-title');
            const targetTitle = allTitles[idx];
            let next = targetTitle.nextElementSibling;
            
            while(next && !next.classList.contains('section-title')) {
                if (next.classList.contains('card')) {
                    const inputs = next.querySelectorAll('input:not([readonly])');
                    inputs.forEach(input => {
                        const val = input.value.trim();
                        if (val !== "") {
                            respondidas++;
                            const correct = answerKey[input.id];
                            if (val == correct) {
                                acertos++;
                                input.classList.add('correct-input');
                                input.classList.remove('error-input');
                            } else {
                                input.classList.add('error-input');
                                input.classList.remove('correct-input');
                            }
                        }
                    });
                }
                next = next.nextElementSibling;
            }

            showStats(quizData[idx].section, acertos, respondidas);
        }

        function showStats(title, acertos, respondidas) {
            document.getElementById('statsTitle').innerText = `Resultado: ${title}`;
            document.getElementById('scoreDisplay').innerText = `${acertos} / ${respondidas}`;
            document.getElementById('feedbackText').innerText = respondidas > 0 
                ? `Você acertou ${(acertos/respondidas*100).toFixed(0)}% das questões que respondeu.`
                : "Responda algumas questões primeiro!";
            document.getElementById('statsOverlay').classList.remove('hidden');
        }

        function closeStats() { document.getElementById('statsOverlay').classList.add('hidden'); }

        function refazer() {
            document.querySelectorAll('input:not([readonly])').forEach(input => {
                input.value = "";
                input.classList.remove('correct-input', 'error-input');
            });
            localStorage.removeItem('uh60_progress');
            updateProgress();
            closeStats();
            if (isGabaritoVisible) toggleGabarito();
        }

        function toggleGabarito() {
            isGabaritoVisible = !isGabaritoVisible;
            const btn = document.getElementById('btnGabarito');
            btn.innerText = isGabaritoVisible ? "Ocultar Gab." : "Gabarito";
            
            document.querySelectorAll('.gabarito-text').forEach(el => el.remove());

            if (isGabaritoVisible) {
                document.querySelectorAll('input:not([readonly])').forEach(input => {
                    const correct = answerKey[input.id];
                    const span = document.createElement('span');
                    span.className = 'gabarito-text';
                    span.innerText = `(${correct})`;
                    input.after(span);
                });
            }
        }

        function updateProgress() {
            const inputs = document.querySelectorAll('input:not([readonly])');
            const total = inputs.length;
            let filled = 0;
            inputs.forEach(i => { if(i.value.trim() !== "") filled++; });
            const percent = total > 0 ? (filled / total * 100).toFixed(0) : 0;
            
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').innerText = `${percent}% concluído (${filled} / ${total} campos)`;
        }

        function saveProgress() {
            const data = {};
            document.querySelectorAll('input:not([readonly])').forEach(i => data[i.id] = i.value);
            localStorage.setItem('uh60_progress', JSON.stringify(data));
        }

        function loadProgress() {
            const saved = localStorage.getItem('uh60_progress');
            if (saved) {
                const data = JSON.parse(saved);
                Object.keys(data).forEach(id => {
                    const input = document.getElementById(id);
                    if (input) input.value = data[id];
                });
            }
        }
    </script>
</body>
</html>
