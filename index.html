<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulado UH-60M – Limitações</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap">
    <style>
        :root {
            --primary: #D4AF37; /* Gold */
            --bg-color: #0F1113;
            --card-bg: #1A1D21;
            --input-bg: #25292E;
            --border-color: #33383E;
            --text-color: #E0E0E0;
            --muted: #8E9299;
            --success: #4CAF50;
            --error: #F44336;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.6;
            padding-bottom: 80px;
            overflow-x: hidden;
            width: 100%;
        }

        .header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            position: relative;
            z-index: 100;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .title-area h1 {
            color: var(--primary);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-container {
            flex: 1;
            max-width: 300px;
        }

        .progress-text {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .progress-bar-bg {
            height: 4px;
            background-color: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .welcome-screen {
            text-align: center;
            padding: 5rem 1rem;
        }

        .welcome-screen h2 {
            margin-bottom: 2rem;
            color: #fff;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .section-title {
            margin: 40px 0 20px;
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .card-header {
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        td, th {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #212529;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="number"] {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 1rem;
            width: 70px;
            text-align: center;
            margin: 0 4px;
            font-weight: bold;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .correct-input {
            border-color: var(--success) !important;
            background-color: rgba(76, 175, 80, 0.1) !important;
        }

        .error-input {
            border-color: var(--error) !important;
            background-color: rgba(244, 67, 54, 0.1) !important;
        }

        .gabarito-text {
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 5px;
        }

        .btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active { transform: scale(0.96); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-color); }

        .btn-section-correct {
            display: block;
            margin: 10px auto 25px;
            width: 100%;
            max-width: 300px;
            font-size: 0.8rem;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .footer-actions {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(26, 29, 33, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .footer-actions .btn { width: 160px; }

        @media (max-width: 1100px) {
            .footer-actions {
                position: fixed !important;
                right: 0 !important;
                left: 0 !important;
                bottom: 0 !important;
                top: auto !important;
                transform: none !important;
                flex-direction: row !important;
                width: 100% !important;
                background: #0F1113 !important;
                padding: 10px 8px !important;
                border-radius: 0 !important;
                border-top: 1px solid var(--border-color) !important;
                gap: 5px !important;
                box-shadow: 0 -5px 15px rgba(0,0,0,0.8) !important;
            }
            .footer-actions .btn {
                flex: 1;
                width: auto;
                font-size: 0.7rem;
                padding: 10px 2px;
                height: 48px;
            }
            .container { padding: 10px 5px; }
            .card { padding: 15px 8px; margin-bottom: 20px; }
            input[type="text"], input[type="number"] { width: 55px; padding: 4px 2px; font-size: 0.9rem; margin: 0 2px; }
            td, th { padding: 8px 4px; font-size: 0.8rem; }
            .section-title { font-size: 1rem; margin: 30px 0 15px; }
            body { padding-bottom: 100px; }
            .header-content { flex-direction: column; text-align: center; }
            .progress-container { width: 100%; max-width: none; }
        }

        .hidden {
            display: none !important;
        }

        .stats-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .stats-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--primary);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        .score-value { font-size: 3rem; color: var(--primary); font-weight: 800; margin: 1rem 0; }
    </style>
</head>
<body>

    <div class="header" id="mainHeader">
        <div class="header-content">
            <div class="title-area">
                <h1>Treino UH-60M – Limitações</h1>
            </div>
            <div class="progress-container">
                <div class="progress-text" id="progressText">0% concluído (0 / 0)</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="welcomeScreen" class="welcome-screen">
            <h2>Simulado de Limitações</h2>
            <button class="btn" onclick="startApp()">Começar Prova</button>
        </div>

        <div id="quizContent" class="hidden">
            <div id="sections"></div>
        </div>
    </div>

    <div class="footer-actions hidden" id="footerActions">
        <button class="btn btn-outline" onclick="refazer()">Refazer</button>
        <button class="btn btn-secondary" onclick="toggleGabarito()" id="btnGabarito">Gabarito</button>
        <button class="btn" onclick="corrigir()">Corrigir Prova</button>
    </div>

    <div id="statsOverlay" class="stats-overlay hidden">
        <div class="stats-card">
            <h3 id="statsTitle">Resultado</h3>
            <div id="scoreDisplay" class="score-value">0/0</div>
            <p id="feedbackText"></p>
            <div style="margin-top: 2rem; display: flex; gap: 10px;">
                <button class="btn btn-secondary" style="flex: 1" onclick="closeStats()">Revisar</button>
                <button class="btn" style="flex: 1" onclick="refazer()">Refazer</button>
            </div>
        </div>
    </div>

                items: [

                    { title: "APU", content: `<table><tr><th>Condição</th><th>Tempo Máximo</th></tr><tr><td>&ge; <input type="number" id="lim_apu_on_temp">ºC (Rotor e motor ligados)</td><td><input type="number" id="lim_apu_on_time"> min</td></tr><tr><td>&le; <input type="number" id="lim_apu_off_temp">ºC (Rotor e motor desligados)</td><td>Sem limite</td></tr><tr><td>APU OIL HOT acesa</td><td><input type="number" id="lim_apu_oil_hot"> min</td></tr></table>` }
                ]
            },
            {
                section: "LIMITES DE ROTOR E BANK",
                items: [
                    { title: "NR COM POTÊNCIA", content: `<table><tr><th>Faixa</th><th>Valor (%)</th></tr><tr><td>Trans 1</td><td><input type="number" id="lim_nr_pot_trans1_low"> - <input type="number" id="lim_nr_pot_trans1_high"></td></tr><tr><td>Contínuo</td><td><input type="number" id="lim_nr_pot_cont_low"> - <input type="number" id="lim_nr_pot_cont_high"></td></tr><tr><td>Trans 2</td><td><input type="number" id="lim_nr_pot_trans2_low"> - <input type="number" id="lim_nr_pot_trans2_high"></td></tr></table>` },
                    { title: "NR EM AUTORROTAÇÃO", content: `<table><tr><th>Faixa</th><th>Valor (%)</th></tr><tr><td>120%</td><td>Só <input type="text" id="lim_nr_auto_mtf_txt" value="MTF" readonly style="width: 40px; border:none; background:transparent; color: #D4AF37;"></td></tr><tr><td>Máximo</td><td><input type="number" id="lim_nr_auto_max"></td></tr><tr><td>Transiente</td><td><input type="number" id="lim_nr_auto_trans_low"> - <input type="number" id="lim_nr_auto_trans_high"></td></tr><tr><td>Normal</td><td><input type="number" id="lim_nr_auto_norm_low"> - <input type="number" id="lim_nr_auto_norm_high"></td></tr></table>` },
                    { title: "LIMITES DE BANK", content: `<table><tr><td>Máx Roll</td><td><input type="number" id="lim_bank_roll">º</td></tr><tr><td>Máx Pitch</td><td><input type="number" id="lim_bank_pitch">º</td></tr><tr><td>PRI SERVO PRESS</td><td><input type="number" id="lim_bank_servo">º</td></tr></table>` }
                ]
            },
            {
                section: "VELOCIDADES MÁXIMAS",
                items: [
                    { title: "VELOCIDADES MÁXIMAS", content: `<table><tr><td>VNE</td><td><input type="number" id="lim_vne"> KIAS</td></tr><tr><td>Farol ext</td><td><input type="number" id="lim_v_farol_ext"> KIAS</td></tr><tr><td>Estender Farol Pouso</td><td><input type="number" id="lim_v_farol_pouso_ext"> KIAS</td></tr><tr><td>Estender Farol Busca</td><td><input type="number" id="lim_v_farol_busca_ext"> KIAS</td></tr><tr><td>Janela MV aberta</td><td><input type="number" id="lim_v_janela"> KIAS</td></tr><tr><td>Porta Cabine Aberta</td><td><input type="number" id="lim_v_porta_aberta"> KIAS</td></tr><tr><td>Abertura Porta em Voo</td><td><input type="number" id="lim_v_porta_voo"> KIAS</td></tr><tr><td>1 HYD / 1 SAS Inop</td><td><input type="number" id="lim_v_1hyd"> KIAS</td></tr><tr><td>2 HYD / 2 SAS Inop</td><td><input type="number" id="lim_v_2hyd"> KIAS</td></tr><tr><td>2 HYD / 2 SAS (IMC)</td><td><input type="number" id="lim_v_2hyd_imc"> KIAS</td></tr><tr><td>Auto &lt; 16825lb</td><td><input type="number" id="lim_v_auto_low"> KIAS</td></tr><tr><td>Auto &ge; 16825lb</td><td><input type="number" id="lim_v_auto_high"> KIAS</td></tr><tr><td>Dist. Máx Auto (Clean)</td><td><input type="number" id="lim_v_auto_dist"> KIAS</td></tr><tr><td>Auto pane STAB</td><td><input type="number" id="lim_v_auto_stab"> KIAS</td></tr><tr><td>Carga ext &lt; 8000lb</td><td><input type="number" id="lim_v_load_low"> KIAS</td></tr><tr><td>Carga ext &gt; 8000lb</td><td><input type="number" id="lim_v_load_high"> KIAS</td></tr><tr><td>1 Eng Inop</td><td><input type="number" id="lim_v_1eng"> KIAS</td></tr><tr><td>Pouso Corrido</td><td><input type="number" id="lim_v_corrido"> KTS</td></tr><tr><td>Vento (Inic/Corte)</td><td><input type="number" id="lim_v_wind_rotor"> KTS</td></tr><tr><td>Vento Lat/Retaguarda</td><td><input type="number" id="lim_v_wind_lat"> KTS</td></tr></table>` }
                ]
            },
            {
                section: "OUTROS LIMITES",
                items: [
                    { title: "ESTABILIZADOR MANUAL", content: `<table><tr><td>&lt; 40 KIAS</td><td><input type="number" id="lim_stab_low40">º</td></tr><tr><td>&gt; 40 KIAS</td><td><input type="number" id="lim_stab_high40">º</td></tr></table>` },
                    { title: "GANCHO", content: `<table><tr><td>Carga Máx</td><td><input type="number" id="lim_hook_load"> lb</td></tr><tr><td>Bank Máx</td><td><input type="number" id="lim_hook_bank">º</td></tr><tr><td>Retaguarda</td><td><input type="number" id="lim_hook_rear"> KT</td></tr></table>` },
                    { title: "WINDSHIELD ANTI-ICE", content: `<table><tr><td>Temp Máx Check</td><td><input type="number" id="lim_anti_ice_check">ºC</td></tr></table>` }
                ]
            },
            {
                section: "LIMITAÇÕES DE POUSO",
                items: [
                    { title: "INCLINAÇÃO E VENTO", content: `<table><tr><td>Nariz Cima / Esq / Dir</td><td><input type="number" id="lim_land_tilt_up">º (-<input type="number" id="lim_land_tilt_red">º p/ cada <input type="number" id="lim_land_tilt_wind">KT)</td></tr><tr><td>Nariz Baixo</td><td><input type="number" id="lim_land_tilt_down">º</td></tr><tr><td>Cauda Máx c/ Nariz Baixo</td><td><input type="number" id="lim_land_wind_tail">KT</td></tr></table>` },
                    { title: "PESO E POUSO", content: `<table><tr><th>Peso</th><th>Terreno</th><th>Razão</th></tr><tr><td rowspan="2">&lt; <input type="number" id="lim_land_weight1"> lb</td><td>Nivelado</td><td><input type="number" id="lim_land_sink1_flat"></td></tr><tr><td>Inclinado</td><td><input type="number" id="lim_land_sink1_slope"></td></tr><tr><td rowspan="2">&gt; <input type="number" id="lim_land_weight2"> lb</td><td>Nivelado</td><td><input type="number" id="lim_land_sink2_flat"></td></tr><tr><td>Inclinado</td><td><input type="number" id="lim_land_sink2_slope"></td></tr></table>` }
                ]
            },
            {
                section: "MANOBRAS",
                items: [
                    { title: "MANOBRAS E YAW", content: `<table><tr><td>Yaw Pairado Proibido &gt;</td><td><input type="number" id="lim_prohib_hover_yaw">º/s</td></tr><tr><td>Yaw Alta Vel (> <input type="number" id="lim_yaw_kias"> KIAS)</td><td>Evite abruptos</td></tr></table>` }
                ]
            }
        ];

        let isGabaritoVisible = false;

        function startApp() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('footerActions').classList.remove('hidden');
            renderQuiz();
            loadProgress();
            updateProgress();
            window.scrollTo(0, 0);
        }

        function renderQuiz() {
            const container = document.getElementById('sections');
            container.innerHTML = quizData.map((sec, secIdx) => `
                <div class="section-title">${sec.section}</div>
                <button class="btn btn-section-correct" onclick="corrigirSecao(${secIdx})">Corrigir ${sec.section}</button>
                ${sec.items.map((item, itemIdx) => `
                    <div class="card">
                        <div class="card-header">${item.title}</div>
                        <div class="card-body">
                            ${item.content}
                        </div>
                    </div>
                `).join('')}
            `).join('');

            // Add input listeners
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', () => {
                    saveProgress();
                    updateProgress();
                });
            });
        }

        function corrigir() {
            let acertos = 0;
            let respondidas = 0;
            const inputs = document.querySelectorAll('input:not([readonly])');

            inputs.forEach(input => {
                const val = input.value.trim();
                if (val !== "") {
                    respondidas++;
                    const correct = answerKey[input.id];
                    if (val == correct) {
                        acertos++;
                        input.classList.add('correct-input');
                        input.classList.remove('error-input');
                    } else {
                        input.classList.add('error-input');
                        input.classList.remove('correct-input');
                    }
                } else {
                    input.classList.remove('correct-input', 'error-input');
                }
            });

            showStats("Geral", acertos, respondidas);
        }

        function corrigirSecao(idx) {
            let acertos = 0;
            let respondidas = 0;
            
            const allTitles = document.querySelectorAll('.section-title');
            const targetTitle = allTitles[idx];
            let next = targetTitle.nextElementSibling;
            
            while(next && !next.classList.contains('section-title')) {
                if (next.classList.contains('card')) {
                    const inputs = next.querySelectorAll('input:not([readonly])');
                    inputs.forEach(input => {
                        const val = input.value.trim();
                        if (val !== "") {
                            respondidas++;
                            const correct = answerKey[input.id];
                            if (val == correct) {
                                acertos++;
                                input.classList.add('correct-input');
                                input.classList.remove('error-input');
                            } else {
                                input.classList.add('error-input');
                                input.classList.remove('correct-input');
                            }
                        }
                    });
                }
                next = next.nextElementSibling;
            }

            showStats(quizData[idx].section, acertos, respondidas);
        }

        function showStats(title, acertos, respondidas) {
            document.getElementById('statsTitle').innerText = `Resultado: ${title}`;
            document.getElementById('scoreDisplay').innerText = `${acertos} / ${respondidas}`;
            document.getElementById('feedbackText').innerText = respondidas > 0 
                ? `Você acertou ${(acertos/respondidas*100).toFixed(0)}% das questões que respondeu.`
                : "Responda algumas questões primeiro!";
            document.getElementById('statsOverlay').classList.remove('hidden');
        }

        function closeStats() { document.getElementById('statsOverlay').classList.add('hidden'); }

        function refazer() {
            document.querySelectorAll('input:not([readonly])').forEach(input => {
                input.value = "";
                input.classList.remove('correct-input', 'error-input');
            });
            localStorage.removeItem('uh60_progress');
            updateProgress();
            closeStats();
            if (isGabaritoVisible) toggleGabarito();
        }

        function toggleGabarito() {
            isGabaritoVisible = !isGabaritoVisible;
            const btn = document.getElementById('btnGabarito');
            btn.innerText = isGabaritoVisible ? "Ocultar Gab." : "Gabarito";
            
            document.querySelectorAll('.gabarito-text').forEach(el => el.remove());

            if (isGabaritoVisible) {
                document.querySelectorAll('input:not([readonly])').forEach(input => {
                    const correct = answerKey[input.id];
                    const span = document.createElement('span');
                    span.className = 'gabarito-text';
                    span.innerText = `(${correct})`;
                    input.after(span);
                });
            }
        }

        function updateProgress() {
            const inputs = document.querySelectorAll('input:not([readonly])');
            const total = inputs.length;
            let filled = 0;
            inputs.forEach(i => { if(i.value.trim() !== "") filled++; });
            const percent = total > 0 ? (filled / total * 100).toFixed(0) : 0;
            
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').innerText = `${percent}% concluído (${filled} / ${total} campos)`;
        }

        function saveProgress() {
            const data = {};
            document.querySelectorAll('input:not([readonly])').forEach(i => data[i.id] = i.value);
            localStorage.setItem('uh60_progress', JSON.stringify(data));
        }

        function loadProgress() {
            const saved = localStorage.getItem('uh60_progress');
            if (saved) {
                const data = JSON.parse(saved);
                Object.keys(data).forEach(id => {
                    const input = document.getElementById(id);
                    if (input) input.value = data[id];
                });
            }
        }
    </script>
</body>
